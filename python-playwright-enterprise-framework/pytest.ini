[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    smoke: Smoke tests for critical application flows
    regression: Full regression test suite
    login: Login module tests
    admin: Admin module tests
    pim: PIM employee management tests